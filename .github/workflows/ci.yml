name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # `labeled` lets a PR opt into the heavy model-test leg by carrying the
    # `model-e2e` label; an unrelated label add no-ops (every job gates off
    # below). GitHub can't filter label events by name at the trigger level.
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 1

jobs:
  build:
    name: Build
    # Skip only label events that aren't adding `model-e2e`; every push / sync /
    # reopen / dispatch still builds normally. Keyed on github.event.label.name
    # (the label that fired THIS event) — not the PR's full label set — so adding
    # an unrelated label to an already-labeled PR does NOT rebuild. model-test
    # reuses the artifacts this job uploads — no second native build.
    if: >-
      github.event.action != 'labeled' ||
      github.event.label.name == 'model-e2e'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-darwin
          cache: false
          rustflags: ''

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          # Don't cache ~/.cargo/bin — restoring it overwrites the
          # rustup proxy installed by setup-rust-toolchain and leaves
          # cargo resolving to rustup-init's usage screen.
          cache-bin: false
          # Bumped after switching toolchain action; forces fresh
          # caches and orphans the poisoned v0-rust archives.
          prefix-key: v1-rust

      - name: Configure GitHub token for CMake downloads
        run: |
          echo "machine github.com login x-access-token password ${{ secrets.GITHUB_TOKEN }}" >> ~/.netrc
          echo "machine objects.githubusercontent.com login x-access-token password ${{ secrets.GITHUB_TOKEN }}" >> ~/.netrc
          chmod 600 ~/.netrc

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build native module
        run: yarn build
        env:
          CARGO_INCREMENTAL: 1

      - uses: actions/upload-artifact@v6
        with:
          name: mlx-node
          path: packages/core/*.node
      # Both metallibs ship as part of the darwin-arm64 optional
      # package: `mlx.metallib` for stock MLX kernels and
      # `paged_attn.metallib` for the paged-attention compile path
      # (loaded via dladdr-relative lookup at runtime). The publish
      # job downloads this artifact INTO
      # `packages/core/npm/darwin-arm64/` so both files have to be
      # in the same artifact to land alongside the .node addon.
      - uses: actions/upload-artifact@v6
        with:
          name: mlx-metallib
          path: |
            packages/core/mlx.metallib
            packages/core/paged_attn.metallib
  test:
    name: ${{ matrix.test }}
    runs-on: macos-latest
    needs: build
    # Label events skip the regular suite — it already ran on the PR's push.
    if: github.event.action != 'labeled'
    strategy:
      fail-fast: false
      matrix:
        test:
          - 'yarn build:ts && yarn test'
          - 'cargo test'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-darwin
          cache: false
          rustflags: ''

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          # Don't cache ~/.cargo/bin — restoring it overwrites the
          # rustup proxy installed by setup-rust-toolchain and leaves
          # cargo resolving to rustup-init's usage screen.
          cache-bin: false
          # Bumped after switching toolchain action; forces fresh
          # caches and orphans the poisoned v0-rust archives.
          prefix-key: v1-rust

      - name: Configure GitHub token for CMake downloads
        run: |
          echo "machine github.com login x-access-token password ${{ secrets.GITHUB_TOKEN }}" >> ~/.netrc
          echo "machine objects.githubusercontent.com login x-access-token password ${{ secrets.GITHUB_TOKEN }}" >> ~/.netrc
          chmod 600 ~/.netrc

      - name: Install dependencies
        run: yarn install --immutable

      - uses: actions/download-artifact@v7
        with:
          name: mlx-node
          path: packages/core/
      - uses: actions/download-artifact@v7
        with:
          name: mlx-metallib
          path: packages/core/
      - name: Run tests
        run: |
          yarn mlx download model --output .cache/models/qwen3-0.6b
          yarn mlx convert --input .cache/models/qwen3-0.6b -d bf16 --output .cache/models/qwen3-0.6b-mlx-bf16
          yarn mlx download dataset
          ${{ matrix.test }}
        env:
          RUST_BACKTRACE: 1
          CARGO_INCREMENTAL: 1
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}

  # Heavy real-model end-to-end leg — reuses the `build` job's native addon +
  # metallib artifacts (no second native build). Each matrix leg downloads +
  # converts the SMALLEST checkpoint for one model family, then runs that
  # family's #[ignore]'d, self-referential tests (paged==flat byte parity,
  # reset/replay determinism, session warm-reuse, greedy MTP==AR). They assert
  # WITHIN a single run, so they need no host-specific golden and stay CI-robust.
  #
  # Opt-in only (heavy): runs on push to main, manual dispatch, or a PR carrying
  # the `model-e2e` label. Excluded families:
  #   * qwen3_5 MoE — smallest published checkpoint is 35B-A3B (~70GB); there is
  #     no small option, and it would not fit a standard macOS runner's RAM.
  #   * gemma4 (`google/gemma-4-E2B-it`, HF-gated; CI's HUGGINGFACE_TOKEN has
  #     access) — bf16 E2B is ~9.6GB on disk, and the paged-vs-flat parity test
  #     holds a flat AND a paged instance resident at once (measured ~20GB peak
  #     RSS; one instance alone ~10GB), so it SIGKILL/jetsam OOMs the 7GB standard
  #     runner. To re-enable: run this leg on a `macos-*-xlarge` (~14GB) runner
  #     with the parity test restructured to load the two models sequentially
  #     (drop flat before loading paged), or convert the checkpoint quantized so
  #     both instances fit. The PLE buffer-cap sharding fix that lets E2B load at
  #     all is already in place.
  model-test:
    name: e2e ${{ matrix.name }}
    needs: build
    # push-to-main and manual dispatch always run. For PRs: a `labeled` event
    # runs ONLY when the just-added label is `model-e2e` (github.event.label.name)
    # — so unrelated label churn on an already-labeled PR is a no-op; a later
    # `synchronize` keeps re-running while the PR still carries the label
    # (full-set contains, gated to non-label actions).
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'model-e2e' ||
      (github.event.action != 'labeled' &&
       contains(github.event.pull_request.labels.*.name, 'model-e2e'))
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: qwen3
            model: Qwen/Qwen3-0.6B
            slug: qwen3-0.6b
            mtype: ''
            env: MLX_TEST_MODEL_PATH
            tests: --test qwen3_paged_vs_flat_parity
          - name: qwen3_5-dense
            model: Qwen/Qwen3.5-0.8B
            slug: qwen3.5-0.8b
            mtype: qwen3_5
            env: MLX_TEST_MODEL_PATH
            tests: >-
              --test qwen3_5_paged_vs_flat_parity
              --test qwen3_5_session
              --test qwen3_5_delta_chat
              --test p2_paged_thinking_honors_enable
          - name: lfm2
            model: LiquidAI/LFM2.5-1.2B-Thinking
            slug: lfm2.5-1.2b-thinking
            mtype: lfm2
            env: MLX_TEST_MODEL_PATH MLX_TEST_LFM2_MODEL_PATH
            tests: >-
              --test lfm2_paged_vs_flat_parity
              --test lfm2_session
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-darwin
          cache: false
          rustflags: ''

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          prefix-key: v1-rust

      - name: Configure GitHub token for CMake downloads
        run: |
          echo "machine github.com login x-access-token password ${{ secrets.GITHUB_TOKEN }}" >> ~/.netrc
          echo "machine objects.githubusercontent.com login x-access-token password ${{ secrets.GITHUB_TOKEN }}" >> ~/.netrc
          chmod 600 ~/.netrc

      - name: Install dependencies
        run: yarn install --immutable

      - uses: actions/download-artifact@v7
        with:
          name: mlx-node
          path: packages/core/
      - uses: actions/download-artifact@v7
        with:
          name: mlx-metallib
          path: packages/core/

      - name: Download + convert ${{ matrix.name }} checkpoint and run its tests
        env:
          RUST_BACKTRACE: 1
          CARGO_INCREMENTAL: 1
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        run: |
          set -euo pipefail
          src=".cache/models/${{ matrix.slug }}"
          out=".cache/models/${{ matrix.slug }}-mlx-bf16"
          yarn mlx download model -m "${{ matrix.model }}" --output "$src"
          if [ -n "${{ matrix.mtype }}" ]; then
            yarn mlx convert --input "$src" -d bf16 -m "${{ matrix.mtype }}" --output "$out"
          else
            yarn mlx convert --input "$src" -d bf16 --output "$out"
          fi
          ckpt="$PWD/$out"
          # Point this family's gating env var(s) at the converted checkpoint so
          # the #[ignore]'d tests un-skip; `-- --ignored` runs only those.
          for v in ${{ matrix.env }}; do export "$v=$ckpt"; done
          cargo test -p mlx-core ${{ matrix.tests }} -- --ignored --nocapture

  lint:
    name: Rust Lint
    runs-on: macos-latest
    # Label events skip lint — it already ran on the PR's push.
    if: github.event.action != 'labeled'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
          target: aarch64-apple-darwin
          cache: false
          rustflags: ''

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          # Don't cache ~/.cargo/bin — restoring it overwrites the
          # rustup proxy installed by setup-rust-toolchain and leaves
          # cargo resolving to rustup-init's usage screen.
          cache-bin: false
          # Bumped after switching toolchain action; forces fresh
          # caches and orphans the poisoned v0-rust archives.
          prefix-key: v1-rust

      - name: Configure GitHub token for CMake downloads
        run: |
          echo "machine github.com login x-access-token password ${{ secrets.GITHUB_TOKEN }}" >> ~/.netrc
          echo "machine objects.githubusercontent.com login x-access-token password ${{ secrets.GITHUB_TOKEN }}" >> ~/.netrc
          chmod 600 ~/.netrc

      - name: Install dependencies
        run: yarn install --immutable

      - name: TypeCheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        env:
          CARGO_INCREMENTAL: 1

  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    needs:
      - test
      - lint
      - model-test
    # Don't publish a release when the e2e model-test matrix fails. `always()`
    # keeps publish running when model-test is SKIPPED (non-release PRs without
    # the `model-e2e` label, where the publish step is a no-op) instead of
    # cascading the skip onto publish; test + lint must still have succeeded.
    if: >-
      always() &&
      needs.test.result == 'success' &&
      needs.lint.result == 'success' &&
      needs.model-test.result != 'failure' &&
      needs.model-test.result != 'cancelled'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build TypeScript
        run: yarn build:ts

      - uses: actions/download-artifact@v7
        with:
          name: mlx-node
          path: packages/core/artifacts
      - uses: actions/download-artifact@v7
        with:
          name: mlx-metallib
          path: packages/core/npm/darwin-arm64/
      - name: move artifacts
        run: yarn workspace @mlx-node/core napi artifacts
      - name: List dir
        run: ls -R packages/core
      - name: Publish package
        run: |
          npm install -g npm
          if git log -1 --pretty=%B | grep "^[0-9]\+\.[0-9]\+\.[0-9]\+$";
          then
            yarn workspaces foreach -Rt --no-private npm publish --access public --tolerate-republish
          elif git log -1 --pretty=%B | grep "^[0-9]\+\.[0-9]\+\.[0-9]\+";
          then
            yarn workspaces foreach -Rt --no-private npm publish --access public --tag next --tolerate-republish 
          else
            echo "Not a release, skipping publish"
          fi
